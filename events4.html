
<!DOCTYPE html>
<html>

<head>
<title>School Events Album</title>

<style>

body{
    margin:0;
    font-family: Trebuchet MS, sans-serif;
    background-image: url("eventbg1.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    text-align:center;
    
}

/* title */
h1{
    color:white;
    background:rgba(0,0,0,0.6);
    padding:15px;
}

/* event container */
.event{
    background:rgba(255,255,255,0.9);
    margin:30px auto;
    padding:20px;
    border-radius:12px;
    width:80%;
}

/* gallery layout */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

/* images */
.gallery img{
    width:200px;
    height:150px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
    transition:transform 0.3s, box-shadow 0.3s;
}

/* hover effect */
.gallery img:hover{
    transform:scale(1.08);
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* videos */
.gallery video{
    width:220px;
    border-radius:8px;
}

/* back button */
.back{
    margin:40px;
}

.back a{
    text-decoration:none;
    background:#4a6fa5;
    color:white;
    padding:12px 25px;
    border-radius:8px;
    font-weight:bold;
}

.back a:hover{
    background:#2f4f7f;
}

/* image popup viewer */
#viewer{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

#viewer img{
    max-width:80%;
    max-height:80%;
    border-radius:10px;
}

</style>
</head>


<body>

<h1>Our School Events Album</h1>
<h2> Click the images and videos for better viewing:OO </h2>
